name: keepalive
# GitHub auto-disables scheduled workflows after 60 days of no repo activity.
# This pushes a tiny dated commit monthly so the `poll` schedule stays enabled.
on:
  schedule:
    - cron: "0 8 1 * *"      # 08:00 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write             # allow the job to commit + push

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Touch keepalive marker and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
          git add .keepalive
          git commit -m "chore: keepalive" || exit 0   # nothing to commit -> succeed
          git push
